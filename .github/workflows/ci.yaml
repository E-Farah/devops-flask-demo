name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run lint (flake8)
      run: flake8 .

    - name: Run tests (Pytest)
      run: pytest

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and push Docker image
      run: |
        docker build -t efarah1/devops-flask-demo:latest .
        docker tag efarah1/devops-flask-demo:latest efarah1/devops-flask-demo:${{ github.sha }}
        docker push efarah1/devops-flask-demo:latest
        docker push efarah1/devops-flask-demo:${{ github.sha }}